<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Gromu</title>
    <link rel="stylesheet" href="/CSS/style.css">
    <link rel="stylesheet" href="/CSS/messagebar.css">
    <link rel="stylesheet" href="/CSS/listachats.css">
    <script src="JS/Scripts.js"></script>
    <script src="JS/listachat.js"></script>
</head>
<body>

    <main id="main-content">
        <header class="app-header">
            <span class="header-title">Chat Gromu</span>
            <img src="/Mídias/ChatGromu.png" alt="ChatGromu logo" class="header-logo">
        </header>

        <div class="menu-icon" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
        
        <div class="chat-area" id="chatArea"></div>

        <div class="chat-input-container">
            <input
                type="text"
                id="chatInput"
                class="chat-input"
                placeholder="Escreve a tua mensagem..."
                onkeydown="if(event.key==='Enter') enviarMensagem()"
            >
            <button class="send-button" onclick="enviarMensagem()">▶</button>
        </div>
    </main>

    <nav id="side-menu" class="side-menu">
        <div class="side-menu-header">
            <button class="close-button" onclick="toggleMenu()">×</button>
            <button class="novochat-button" onclick="createNewChat()">Novo chat</button>
        </div>
        <div class="chat-list" id="chatList"></div>
    </nav>

</body>

</html>
